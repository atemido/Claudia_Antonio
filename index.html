<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" 
  rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <!-- Our CSS loads AFTER Bootstrap so it overrides it -->
  <link rel="stylesheet" href="./conviete.css">
</head>

<body>

  <!-- IMAGE 1 -->
  <div class="photo-block">
    <img src="./images/Foto 1.png" alt="Wedding Photo 1" class="wedding-img" />
  </div>

  <!-- IMAGE 2 -->
  <div class="photo-block gap-top">
    <img src="./images/Foto 2.png" alt="Wedding Photo 2" class="wedding-img" />
  </div>

  <!-- IMAGE 3 -->
  <div class="photo-block" style="margin-bottom: 10px">
    <img src="./images/Foto 3 v2.png" alt="Wedding Photo 3" class="wedding-img" />
  </div>

  <!-- LOCATION ICON 1 -->
  <div class="location-block">
    <a href="https://maps.app.goo.gl/s6XFAt1t2vu3QFyW8" target="_blank" class="map-link" aria-label="Open in Google Maps">
      <svg class="map-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="27" r="10" stroke="currentColor" stroke-width="2.5"/>
        <path d="M32 8C21.507 8 13 16.507 13 27c0 14.25 19 33 19 33S51 41.25 51 27C51 16.507 42.493 8 32 8z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
      <span class="map-text">Ver no Mapa</span>
    </a>
  </div>

  <!-- IMAGE 4 -->
  <div class="photo-block gap-top" style="margin-bottom: 15px">
    <img src="./images/Foto 4 v2.png" alt="Wedding Photo 4" class="wedding-img" />
  </div>

  <!-- LOCATION ICON 2 -->
  <div class="location-block">
    <a href="https://maps.app.goo.gl/4PuGam5XKUvyZMpt7" target="_blank" class="map-link" aria-label="Open in Google Maps">
      <svg class="map-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="27" r="10" stroke="currentColor" stroke-width="2.5"/>
        <path d="M32 8C21.507 8 13 16.507 13 27c0 14.25 19 33 19 33S51 41.25 51 27C51 16.507 42.493 8 32 8z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
      <span class="map-text">Ver no Mapa</span>
    </a>
  </div>

  <!-- IMAGE 5 -->
  <div class="photo-block gap-both">
    <img src="./images/Foto 5 v2.png" alt="Wedding Photo 5" class="wedding-img" />
  </div>

  <!-- IMAGE 6 -->
  <div class="photo-block">
    <img src="./images/Foto 6.png" alt="Wedding Photo 6" class="wedding-img" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" 
  integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
